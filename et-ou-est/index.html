<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1226" />
  <meta http-equiv="cache-control" content="no-cache" />
  <title>et ou est ? — entraînement</title>
  <link rel="stylesheet" href="style.cf57278fe6.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>« et » ou « est » ?</h1>
      <p>Choisis le bon mot dans chaque trou, puis vérifie.</p>
    </header>

    <section class="sentence" id="sentence" aria-label="phrase à compléter"></section>

    <section class="feedback" id="feedback"></section>

    <section class="controls">
      <button class="primary" id="check" disabled>Vérifier</button>
      <button class="primary" id="next" hidden>Nouvelle phrase</button>
    </section>

    <section class="stats" id="stats"></section>

    <section class="rules">
      <b>Astuce :</b> « <b>est</b> » (= être, verbe) ; « <b>et</b> » (= lier deux choses).
      Ex. : « le chat <b>est</b> noir <b>et</b> petit ».
    </section>

    <footer class="appver" id="appver" data-version="1.0.2">v1.0.2</footer>
  </main>

  <script src="app.e7dd2e6e18.js"></script>
